<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сканер Участников</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body {
        background-color: #0b0d19;
      }

      #app-shell {
        position: relative;
        width: 100%;
        max-width: 420px;
        min-height: 700px;
        background-image: url("img/background.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        border-radius: 2rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      #app-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(11, 13, 25, 0.2) 0%,
          rgba(11, 13, 25, 0.85) 100%
        );
        z-index: 0;
      }

      .content-layer {
        position: relative;
        z-index: 1;
      }

      .title {
        color: #ffffff;
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        font-weight: bold;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }

      .scaner-button {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
        margin-top: 100px;
      }

      .event-text {
        font-family: "Arial Rounded MT Bold", Arial, Helvetica, sans-serif;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>

  <body
    class="text-gray-100 font-sans min-h-screen p-4 flex items-center justify-center"
  >
    <div id="app-shell" class="p-6">
      <header class="text-center my-4 content-layer">
        <h1 class="text-3xl title tracking-wide">LEVEL DANCE</h1>
        <p class="event-text">Мероприятия</p>
        <p
          class="text-xs text-purple-200 font-medium tracking-widest uppercase mt-2"
        >
          Контроль Доступа
        </p>
      </header>

      <main class="w-full content-layer my-auto">
        <div id="scan-container" class="w-full text-center p-2">
          <p class="text-gray-100 text-sm mb-8 font-medium drop-shadow-md">
            Нажмите кнопку ниже, чтобы открыть камеру Telegram и отсканировать
            QR-код билета.
          </p>

          <div
            id="error-message"
            class="hidden text-sm text-red-200 bg-red-950/80 border border-red-500/40 rounded-xl p-3 mb-4"
          ></div>

          <button
            type="button"
            onclick="startScanning()"
            class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-6 rounded-xl transition duration-200 shadow-lg shadow-purple-900/50 active:scale-95 text-base tracking-wide scaner-button"
          >
            [ ] Открыть сканер
          </button>
        </div>

        <div
          id="result-container"
          class="w-full bg-slate-950/75 backdrop-blur-md rounded-2xl border border-white/10 p-5 shadow-xl hidden"
        >
          <h2
            id="event-title"
            class="text-base font-bold text-center text-purple-200 border-b border-white/10 pb-3 mb-4 tracking-wide"
          >
            Название мероприятия
          </h2>

          <div class="space-y-3.5 text-sm">
            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >Статус билета</span
              >
              <p id="ticket-status" class="font-bold mt-0.5">—</p>
            </div>

            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >ФИО Покупателя</span
              >
              <p id="buyer-name" class="font-semibold text-white mt-0.5">—</p>
            </div>

            <div>
              <span
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                >Telegram аккаунт</span
              >
              <p id="tg-username" class="text-purple-300 mt-0.5">—</p>
            </div>

            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5">
              <div>
                <span
                  class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                  >ID / Тип</span
                >
                <p id="event-info" class="text-xs text-gray-200 mt-0.5">—</p>
              </div>
              <div class="text-right">
                <span
                  class="text-[10px] text-gray-400 uppercase font-bold tracking-widest block"
                  >Цена билета</span
                >
                <p id="ticket-price" class="text-emerald-400 font-bold mt-0.5">
                  —
                </p>
              </div>
            </div>
          </div>

          <button
            onclick="resetScanner()"
            class="w-full mt-6 bg-white/10 hover:bg-white/20 text-white font-medium py-2.5 px-4 rounded-xl border border-white/10 transition duration-200 text-sm shadow-inner"
          >
            Сканировать следующий
          </button>
        </div>
      </main>
    </div>

    <script>
      const tg =
        window.Telegram && window.Telegram.WebApp
          ? window.Telegram.WebApp
          : null;

      // СЮДА СВОЙ ДОМЕН / URL ОТ NGROK СЕРВЕРА FASTAPI
      const API_BASE_URL = "https://daughter-equate-suburb.ngrok-free.dev";

      // ФУНКЦИЯ ДЛЯ ВЫВОДА ЛОГОВ НА ЭКРАН
      function logToScreen(type, message, data = null) {
        const errorElement = document.getElementById("error-message");

        // Делаем блок видимым, меняем стиль под системную консоль
        errorElement.classList.remove("hidden");
        errorElement.className =
          "text-left text-xs font-mono bg-black/90 border border-purple-500/50 rounded-xl p-3 mb-4 max-h-60 overflow-y-auto space-y-1 text-gray-300 shadow-inner";

        let colorClass = "text-blue-400"; // По умолчанию INFO
        if (type === "SUCCESS") colorClass = "text-emerald-400 font-bold";
        if (type === "ERROR") colorClass = "text-red-400 font-bold";
        if (type === "WARN") colorClass = "text-amber-400";

        const time = new Date().toLocaleTimeString();
        let logLine = `<div>[${time}] <span class="${colorClass}">${type}</span>: ${message}</div>`;

        if (data) {
          logLine += `<pre class="text-[10px] text-gray-500 bg-gray-950 p-1.5 rounded mt-0.5 overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>`;
        }

        // Дописываем лог вниз
        errorElement.innerHTML += logLine;
        // Скроллим консоль вниз
        errorElement.scrollTop = errorElement.scrollHeight;
      }

      function clearLogs() {
        const errorElement = document.getElementById("error-message");
        errorElement.innerHTML = "";
        errorElement.classList.add("hidden");
      }

      function initTelegramWebApp() {
        logToScreen("INFO", "Инициализация Telegram WebApp...");
        if (!tg) {
          logToScreen(
            "WARN",
            "Telegram WebApp объект не найден! Работаем вне ТГ?",
          );
          return;
        }
        try {
          tg.ready();
          logToScreen("INFO", "tg.ready() успешно вызван");
          if (typeof tg.expand === "function") {
            tg.expand();
            logToScreen(
              "INFO",
              "tg.expand() вызван (развернуто на весь экран)",
            );
          }

          // Логируем наличие initData
          if (tg.initData) {
            logToScreen(
              "INFO",
              `initData найдена (длина: ${tg.initData.length} символов)`,
            );
          } else {
            logToScreen(
              "WARN",
              "initData ПУСТАЯ! Запрос на бэк может не пройти валидацию.",
            );
          }
        } catch (error) {
          logToScreen("ERROR", "Ошибка при инициализации ТГ:", error.message);
        }
      }

      function setLoadingState() {
        document.getElementById("event-title").innerText =
          "Загрузка данных билета...";
        document.getElementById("buyer-name").innerText = "—";
        document.getElementById("tg-username").innerText = "—";
        document.getElementById("event-info").innerText = "—";
        document.getElementById("ticket-price").innerText = "—";
        document.getElementById("ticket-status").innerText = "—";
      }

      // Запускаем первичные логи
      initTelegramWebApp();

      function startScanning() {
        clearLogs();
        logToScreen("INFO", "Нажата кнопка запуска сканера");

        if (!tg) {
          logToScreen("ERROR", "Не могу открыть сканер: запуск вне Telegram");
          return;
        }
        if (
          typeof tg.isVersionAtLeast !== "function" ||
          !tg.isVersionAtLeast("6.4")
        ) {
          logToScreen("ERROR", "Версия ТГ ниже 6.4. Сканер не поддерживается.");
          return;
        }

        logToScreen("INFO", "Вызываем tg.showScanQrPopup...");
        tg.showScanQrPopup(
          { text: "Наведите камеру на QR-код билета" },
          function (text) {
            logToScreen(
              "SUCCESS",
              `QR-код успешно считан! Текст из QR: "${text}"`,
            );
            handleScannedUrl(text);
            return true; // Закрываем шторку камеры
          },
        );
      }

      function handleScannedUrl(text) {
        if (!text || typeof text !== "string") {
          logToScreen("ERROR", " handleScannedUrl получил пустой текст");
          return;
        }

        logToScreen("INFO", "Парсим полученный текст в URL...");
        let parsedUrl;
        try {
          parsedUrl = new URL(text);
          logToScreen("INFO", `URL успешно распарсен. Хост: ${parsedUrl.host}`);
        } catch (error) {
          logToScreen("ERROR", "Текст из QR не является валидным URL-адресом");
          return;
        }

        const ticketId = parsedUrl.searchParams.get("startapp");
        logToScreen(
          "INFO",
          `Ищем параметр 'startapp' в URL... Результат: "${ticketId}"`,
        );

        if (!ticketId) {
          logToScreen(
            "ERROR",
            "Параметр 'startapp' отсутствует в данном QR-коде!",
          );
          return;
        }

        fetchDataFromServer(ticketId);
      }

      async function fetchDataFromServer(ticketId) {
        setLoadingState();
        const targetUrl = `${API_BASE_URL}/api/participant/${encodeURIComponent(ticketId)}`;

        logToScreen("INFO", "Подготовка к отправке fetch запроса...");
        logToScreen("INFO", `👉 URL запроса: ${targetUrl}`);

        const headersToSend = {
          "Content-Type": "application/json",
          "X-Tg-Init-Data": tg?.initData || "",
          "ngrok-skip-browser-warning": "69420"
        };
        logToScreen("INFO", "👉 Отправляемые заголовки:", headersToSend);

        try {
          logToScreen("INFO", "Отправляем fetch запрос на сервер...");
          const response = await fetch(targetUrl, {
            method: "GET",
            headers: headersToSend,
          });

          logToScreen(
            "INFO",
            `Статус ответа от сервера: ${response.status} (${response.statusText})`,
          );

          if (!response.ok) {
            logToScreen(
              "ERROR",
              `Сервер вернул ошибку! Статус: ${response.status}`,
            );
            if (response.status === 404)
              throw new Error("Билет не найден в базе данных.");
            if (response.status === 403)
              throw new Error(
                "Ошибка безопасности: доступ заблокирован бэкендом.",
              );
            throw new Error(`Ошибка сервера. Статус: ${response.status}`);
          }

          logToScreen(
            "INFO",
            "Запрос успешен (response.ok = true). Читаем JSON body...",
          );
          const data = await response.json();

          logToScreen("SUCCESS", "Данные успешно получены с бэка!", data);
          renderTicketCard(data);
        } catch (error) {
          logToScreen(
            "ERROR",
            `💥 Перехвачена критическая ошибка во fetch: "${error.message}"`,
          );
          // Если это реальный Failed to fetch, выведем подробности
          if (error.message === "Failed to fetch") {
            logToScreen(
              "ERROR",
              "Подсказка: Проверь, работает ли сервер/ngrok, совпадает ли ссылка, или это блокировка CORS/MixContent.",
            );
          }
        }
      }

      function renderTicketCard(ticket) {
        logToScreen(
          "INFO",
          "Начинаем рендеринг карточки результата на экране...",
        );

        document.getElementById("event-title").innerText =
          ticket?.event_name || "Без названия";
        document.getElementById("buyer-name").innerText =
          ticket?.name || "Не указано";
        document.getElementById("tg-username").innerText = ticket?.username
          ? `@${ticket.username}`
          : "Нет юзернейма";

        const typeRu =
          ticket?.event_type === "festival" ? "Фестиваль" : "Концерт";
        document.getElementById("event-info").innerText =
          `#${ticket?.event_id || 0} [${typeRu}]`;
        document.getElementById("ticket-price").innerText = ticket?.price
          ? `${ticket.price} ₽`
          : "0 ₽";

        const statusElement = document.getElementById("ticket-status");
        if (ticket?.entered_at) {
          statusElement.innerText = `❌ УЖЕ ИСПОЛЬЗОВАН (${ticket.entered_at})`;
          statusElement.className =
            "text-xs font-bold mt-0.5 text-red-400 bg-red-950/40 p-1.5 rounded border border-red-500/20";
          logToScreen(
            "WARN",
            `Вход заблокирован: билет уже был погашен в ${ticket.entered_at}`,
          );
        } else {
          statusElement.innerText = "✅ ДЕЙСТВИТЕЛЕН (Вход разрешен)";
          statusElement.className =
            "text-xs font-bold mt-0.5 text-emerald-400 bg-emerald-950/40 p-1.5 rounded border border-emerald-500/20";
          logToScreen("SUCCESS", "Вход разрешен! Билет чистый.");
        }

        document.getElementById("scan-container").classList.add("hidden");
        document.getElementById("result-container").classList.remove("hidden");
        logToScreen("SUCCESS", "Карточка результата успешно отображена.");
      }

      function resetScanner() {
        clearLogs();
        document.getElementById("result-container").classList.add("hidden");
        document.getElementById("scan-container").classList.remove("hidden");
        logToScreen("INFO", "Сканер сброшен, готовы к новому сканированию");
      }
    </script>
  </body>
</html>
