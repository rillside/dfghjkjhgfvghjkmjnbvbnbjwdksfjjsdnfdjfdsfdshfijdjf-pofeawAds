<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Сохраняем полный URL и редиректим на index.html
      // GitHub Pages отдаёт этот файл при любом 404 — используем это
      const url = new URL(window.location.href);
      const params = url.search; // ?startapp=n
      window.location.replace("index.html" + params);
    </script>
  </head>
  <body></body>
</html>
